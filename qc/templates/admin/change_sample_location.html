{% extends "admin/base_site.html" %}

{% block content %}

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    {% for obj in items %}
        <input type="hidden" name="_selected_action" value="{{ obj.pk }}">
    {% endfor %}

    <input type="hidden" name="action" value="move_samples_to_location">
    <input type="hidden" name="apply" value="1">

    <button type="submit" class="default">
        Move Samples
    </button>
</form>

{% endblock %}
