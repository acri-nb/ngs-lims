<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset | NGS-LIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2332; --accent: #00b4d8; --accent-dark: #0096b4;
            --surface: #ffffff; --text: #1a2332; --text-muted: #6b7a8f; --success: #2dc653;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--primary);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 1rem;
            background-image:
                linear-gradient(rgba(0,180,216,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,180,216,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .login-wrap { width: 100%; max-width: 420px; }
        .login-brand { text-align: center; margin-bottom: 2rem; }
        .login-brand-logo {
            width: 56px; height: 56px; background: rgba(0,180,216,0.15);
            border: 1px solid rgba(0,180,216,0.3); border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 0.75rem; font-size: 1.5rem; color: var(--accent);
        }
        .login-brand-name {
            font-family: 'IBM Plex Mono', monospace; font-weight: 600;
            font-size: 1.1rem; color: #fff; letter-spacing: 0.08em;
        }
        .login-brand-sub { font-size: 0.8rem; color: rgba(255,255,255,0.45); margin-top: 2px; }
        .login-card {
            background: var(--surface); border-radius: 14px; padding: 2rem;
            box-shadow: 0 24px 64px rgba(0,0,0,0.3); text-align: center;
        }
        .status-icon {
            width: 52px; height: 52px; border-radius: 50%; background: rgba(45,198,83,0.12);
            color: var(--success); display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin-bottom: 1rem;
        }
        .login-card h2 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin: 0 0 0.5rem; }
        .login-card-sub { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.5rem; }
        .btn-login {
            width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 7px;
            padding: 0.65rem; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.925rem;
            font-weight: 500; text-decoration: none; display: inline-block;
            transition: background 0.15s, transform 0.1s;
        }
        .btn-login:hover { background: var(--accent-dark); color: #fff; }
        .login-footer { text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-brand">
        <div class="login-brand-logo"><i class="fas fa-dna"></i></div>
        <div class="login-brand-name">NGS-LIMS</div>
        <div class="login-brand-sub">Atlantic Cancer Research Institute</div>
    </div>

    <div class="login-card">
        <div class="status-icon"><i class="fas fa-check"></i></div>
        <h2>Password reset complete</h2>
        <p class="login-card-sub">Your password has been updated. You can sign in with your new password now.</p>
        <a href="{% url 'login' %}" class="btn-login">
            <i class="fas fa-sign-in-alt me-2"></i>Sign in
        </a>
    </div>

    <div class="login-footer">
        NGS-LIMS &copy; {% now "Y" %} — IARC
    </div>
</div>

</body>
</html>
