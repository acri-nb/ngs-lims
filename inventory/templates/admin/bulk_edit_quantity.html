{% extends "admin/base_site.html" %}

{% block content %}
<h1>Bulk Edit Inventory Quantities</h1>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    {% for item in items %}
        <input type="hidden" name="_selected_action" value="{{ item.inventory_id }}">
    {% endfor %}

    <input type="hidden" name="action" value="bulk_edit_quantity">
    <input type="hidden" name="apply" value="1">

    <button type="submit">Apply</button>
</form>

<h2>Selected Items</h2>
<ul>
{% for item in items %}
    <li>{{ item }}</li>
{% endfor %}
</ul>

{% endblock %}
